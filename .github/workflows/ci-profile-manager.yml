name: CI — Profile Manager (C1)

on:
  pull_request:
    paths:
      - 'services/profile-manager/**'
      - 'shared/**'
      - '.github/workflows/ci-profile-manager.yml'

jobs:
  test:
    name: Test Profile Manager
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter profile-manager db:generate

      - name: Type check
        run: pnpm --filter profile-manager tsc --noEmit

      - name: Lint
        run: pnpm --filter profile-manager lint

      - name: Run migrations
        run: pnpm --filter profile-manager db:migrate
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test

      - name: Seed reference domain
        run: pnpm --filter @nexus/types db:seed
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test

      - name: Unit tests
        run: pnpm --filter profile-manager test:unit

      - name: Integration tests
        run: pnpm --filter profile-manager test:integration
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test
          JWT_SECRET: test-secret
          SERVICE_API_KEY: test-service-key
