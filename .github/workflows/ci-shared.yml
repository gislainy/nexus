name: CI — Shared Types

on:
  pull_request:
    paths:
      - 'shared/**'
      - '.github/workflows/ci-shared.yml'

jobs:
  check:
    name: Type Check Shared
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @nexus/types tsc --noEmit

      - name: Lint
        run: pnpm --filter @nexus/types lint

      - name: Unit tests
        run: pnpm --filter @nexus/types test
