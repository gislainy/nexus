name: CI — Auth Service

on:
  pull_request:
    paths:
      - 'services/auth/**'
      - 'shared/**'
      - '.github/workflows/ci-auth.yml'

jobs:
  test:
    name: Test Auth Service
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter auth db:generate

      - name: Type check
        run: pnpm --filter auth tsc --noEmit

      - name: Lint
        run: pnpm --filter auth lint

      - name: Run migrations
        run: pnpm --filter auth db:migrate
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test

      - name: Unit tests
        run: pnpm --filter auth test:unit
        env:
          JWT_SECRET: test-secret

      - name: Integration tests
        run: pnpm --filter auth test:integration
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test
          JWT_SECRET: test-secret
