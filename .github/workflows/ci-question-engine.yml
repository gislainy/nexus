name: CI — Question Engine (C3)

on:
  pull_request:
    paths:
      - 'services/question-engine/**'
      - 'shared/**'
      - '.github/workflows/ci-question-engine.yml'

jobs:
  test:
    name: Test Question Engine
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus_test
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter question-engine tsc --noEmit

      - name: Lint
        run: pnpm --filter question-engine lint

      - name: Run migrations
        run: pnpm --filter question-engine db:migrate
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test

      - name: Unit tests
        run: pnpm --filter question-engine test:unit

      - name: Integration tests
        run: pnpm --filter question-engine test:integration
        env:
          DATABASE_URL: postgresql://nexus:nexus_test@localhost:5432/nexus_test
