services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_dev}
      POSTGRES_DB: ${POSTGRES_DB:-nexus_test}
    ports:
      - "${POSTGRES_TEST_PORT:-55433}:5432"
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus} -d ${POSTGRES_DB:-nexus_test}"]
      interval: 5s
      timeout: 5s
      retries: 10
